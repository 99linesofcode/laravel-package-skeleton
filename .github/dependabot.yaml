version: 2
updates:
  - package-ecosystem: gitsubmodule
    directory: /
    schedule:
      interval: daily
      time: '06:00'
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '06:00'
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    cooldown:
      default-days: 7
    groups:
      automated:
        update-types:
          - 'patch'
          - 'minor'
      manual:
        update-types:
          - 'major'

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: daily
      time: '06:00'
    assignees:
      - 99linesofcode
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    cooldown:
      default-days: 7
    groups:
      automated:
        update-types:
          - 'patch'
          - 'minor'
      manual:
        update-types:
          - 'major'
