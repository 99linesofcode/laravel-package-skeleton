env:
  APP_NAME: laravel-package-skeleton
migrations:
  - workbench/database/migrations
  - database/migrations
seeders:
  - Database\Seeders\PostSeeder
providers:
  - Workbench\App\Providers\WorkbenchServiceProvider
purge:
  files:
    - .env
  directories:
    - public/build
    - public/vendor/*
workbench:
  auth: false
  discovers:
    api: true
    commands: true
    config: true
    factories: true
    views: true
    web: true
  install: false # run default laravel migrations
  sync:
    - from: storage
      to: workbench/storage
      reverse: true
  welcome: true
